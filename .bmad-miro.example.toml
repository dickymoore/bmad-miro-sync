board_url = "https://miro.com/app/board/uXjVGixS6vQ=/"
source_root = "_bmad-output"
manifest_path = ".bmad-miro-sync/state.json"

# Optional discovery overrides. Leave commented to keep the legacy
# source_root behavior, or enable to restrict discovery to canonical inputs.
#[discovery]
#source_paths = ["_bmad-output/planning-artifacts", "_bmad-output/implementation-artifacts", "_bmad-output/review-artifacts"]
#required_artifact_classes = ["prd", "ux_design", "architecture"]

# Optional object strategy overrides for degraded-mode hosts. Leave
# commented to keep the preferred object types.
#[object_strategies]
#phase_zone = "workstream_anchor"  # default: "zone"
#story_summary = "doc"             # default: "table"

[layout]
create_phase_frames = true
#doc_width = 620
#table_width = 760
#content_start_y = 220
#content_gap_y = 96
#source_gap_y = 88
#source_header_width = 760
#source_header_height = 132
#source_content_indent_x = 84
#fragment_indent_x = 150
#fragment_gap_y = 72
#zone_width = 6400
#zone_height = 180
#workstream_header_width = 1180
#workstream_header_height = 120

#[layout.phase_y]
#analysis = -1800
#planning = -600
#solutioning = 600
#implementation = 1800

#[layout.workstream_x]
#general = -2400
#product = -1200
#ux = 0
#architecture = 1200
#delivery = 2400

#[layout.phase_colors]
#analysis = "#d8f0dc"
#planning = "#dbe7ff"
#solutioning = "#fff0c9"
#implementation = "#f8d9dc"

#[layout.workstream_colors]
#general = "#6b7280"
#product = "#2563eb"
#ux = "#d97706"
#architecture = "#059669"
#delivery = "#7c3aed"

[publish]
analysis = true
planning = true
solutioning = true
implementation = true
stories_table = true

[sync]
removed_item_policy = "archive"
